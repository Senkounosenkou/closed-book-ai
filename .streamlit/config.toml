[client]
toolbarMode = "minimal"  # アンタが設定してたやつ（メニューをスッキリさせる）

[server]
headless = true
address = "0.0.0.0"      # Dockerで動かすなら必須
port = 8501
enableCORS = false       # トラブル防止

[theme]
base = "dark"            # これで強制ダークモード
primaryColor = "#F63366" # アクセントカラー（ピンクっぽい赤）
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#262730"
textColor = "#FAFAFA"
font = "sans serif"
